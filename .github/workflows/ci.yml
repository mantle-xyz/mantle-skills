name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell syntax
        run: bash -n evals/runner/run.sh evals/runner/run-all-skills.sh evals/runner/tests/*.sh

      - name: Run eval smoke tests
        run: |
          ./evals/runner/tests/run-list-skills-smoke.sh
          ./evals/runner/tests/run-all-skills-smoke.sh
          ./evals/runner/tests/run-all-skills-progress-smoke.sh
          ./evals/runner/tests/openrouter-provider-smoke.sh
          ./evals/runner/tests/openrouter-judge-json-retry-smoke.sh
